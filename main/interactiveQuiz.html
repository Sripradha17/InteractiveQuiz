<!DOCTYPE html> <!-- Declares the document type and version of HTML used (HTML5) -->
<html lang="en"> <!-- Root element of the document with language set to English -->
  <head>
    <meta charset="UTF-8" /> <!-- Sets character encoding to UTF-8 for universal character support -->
    <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Ensures responsive layout on mobile devices -->
    <title>Quiz Categories</title> <!-- Sets the title of the browser tab -->
    <link rel="stylesheet" href="styles.css" /> <!-- Links the external CSS stylesheet for styling -->
  </head>
  <body>
    <!-- Ambient animated background blobs, purely decorative -->
    <div class="bg-blob blob-1" aria-hidden="true"></div>
    <div class="bg-blob blob-2" aria-hidden="true"></div>
    <div class="bg-blob blob-3" aria-hidden="true"></div>

    <h1 class="title">Choose a Quiz Category</h1> <!-- Main heading of the page with a CSS class "title" -->

    <!-- Grid container for category cards -->
    <div class="card-grid">

      <!-- Each card's visual is a calm, static gradient panel with a single line-art icon (no external images, no emoji) -->

      <div class="card" data-subject="Science" role="button" tabindex="0" aria-label="Start Science quiz" onclick="startQuiz('Science')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><ellipse cx="12" cy="12" rx="9" ry="3.4"/><ellipse cx="12" cy="12" rx="9" ry="3.4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.4" transform="rotate(120 12 12)"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Science</h2>
        </div>
      </div>

      <div class="card" data-subject="History" role="button" tabindex="0" aria-label="Start History quiz" onclick="startQuiz('History')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8 L12 4 L19 8"/><line x1="5" y1="8" x2="19" y2="8"/><line x1="7" y1="8" x2="7" y2="19"/><line x1="12" y1="8" x2="12" y2="19"/><line x1="17" y1="8" x2="17" y2="19"/><line x1="5" y1="20" x2="19" y2="20"/></svg></span>
        </div>
        <div class="card-content">
          <h2>History</h2>
        </div>
      </div>

      <div class="card" data-subject="Geography" role="button" tabindex="0" aria-label="Start Geography quiz" onclick="startQuiz('Geography')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M4.5 7.5 Q12 10.5 19.5 7.5"/><path d="M4.5 16.5 Q12 13.5 19.5 16.5"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Geography</h2>
        </div>
      </div>

      <div class="card" data-subject="Literature" role="button" tabindex="0" aria-label="Start Literature quiz" onclick="startQuiz('Literature')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6 C7 4.3 10 4.3 12 6.2 C14 4.3 17 4.3 21 6 L21 18 C17 16.3 14 16.3 12 18.2 C10 16.3 7 16.3 3 18 Z"/><line x1="12" y1="6.2" x2="12" y2="18.2"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Literature</h2>
        </div>
      </div>

      <div class="card" data-subject="Math" role="button" tabindex="0" aria-label="Start Math quiz" onclick="startQuiz('Math')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="20" x2="21" y2="20"/><line x1="3" y1="20" x2="3" y2="4"/><path d="M4 15 Q8 6 12 13 T20 7"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Math</h2>
        </div>
      </div>

      <div class="card" data-subject="Sports" role="button" tabindex="0" aria-label="Start Sports quiz" onclick="startQuiz('Sports')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3.5 9.5 Q12 13.5 20.5 9.5"/><path d="M8 3.5 Q12 12 8 20.5"/><path d="M16 3.5 Q12 12 16 20.5"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Sports</h2>
        </div>
      </div>

      <div class="card" data-subject="Technology" role="button" tabindex="0" aria-label="Start Technology quiz" onclick="startQuiz('Technology')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="7" y="7" width="10" height="10" rx="2"/><line x1="9" y1="2" x2="9" y2="7"/><line x1="15" y1="2" x2="15" y2="7"/><line x1="9" y1="17" x2="9" y2="22"/><line x1="15" y1="17" x2="15" y2="22"/><line x1="2" y1="9" x2="7" y2="9"/><line x1="2" y1="15" x2="7" y2="15"/><line x1="17" y1="9" x2="22" y2="9"/><line x1="17" y1="15" x2="22" y2="15"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Technology</h2>
        </div>
      </div>

      <div class="card" data-subject="Movies" role="button" tabindex="0" aria-label="Start Movies quiz" onclick="startQuiz('Movies')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="12" rx="1.5"/><path d="M3 9 L6.5 4.5 L10.5 9 M9.5 9 L13 4.5 L17 9 M16 9 L19.5 4.8 L21 7.5"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Movies</h2>
        </div>
      </div>

      <div class="card" data-subject="Music" role="button" tabindex="0" aria-label="Start Music quiz" onclick="startQuiz('Music')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="17" r="3" fill="currentColor" stroke="none"/><line x1="10" y1="17" x2="10" y2="4"/><path d="M10 4 L18 6.5 L18 10.5 L10 8"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Music</h2>
        </div>
      </div>

      <div class="card" data-subject="Art" role="button" tabindex="0" aria-label="Start Art quiz" onclick="startQuiz('Art')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 C6.5 3 3 6.8 3 11.5 C3 15.6 6 18.5 9.8 18.5 C10.4 18.5 10.7 17.7 10.4 17.2 C10 16.5 10.3 15.6 11.2 15.6 C16 15.6 21 13 21 8.7 C21 5.4 17 3 12 3 Z"/><circle cx="8" cy="10.5" r="1" fill="currentColor" stroke="none"/><circle cx="12.5" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="16.5" cy="10.5" r="1" fill="currentColor" stroke="none"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Art</h2>
        </div>
      </div>

      <div class="card" data-subject="Animals" role="button" tabindex="0" aria-label="Start Animals quiz" onclick="startQuiz('Animals')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><ellipse cx="12" cy="16.5" rx="5" ry="4"/><circle cx="6" cy="9.5" r="2"/><circle cx="10.7" cy="6.3" r="2"/><circle cx="15.3" cy="6.3" r="2"/><circle cx="20" cy="9.5" r="2"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Animals</h2>
        </div>
      </div>

      <div class="card" data-subject="Space" role="button" tabindex="0" aria-label="Start Space quiz" onclick="startQuiz('Space')">
        <div class="card-visual">
          <span class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="5"/><ellipse cx="12" cy="12" rx="10" ry="3" transform="rotate(-20 12 12)"/></svg></span>
        </div>
        <div class="card-content">
          <h2>Space</h2>
        </div>
      </div>
    </div>

    <!-- Modal for quiz interaction -->
    <div id="quizModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="quizTitle"> <!-- Hidden modal initially (CSS controls visibility) -->
      <div class="modal-content"> <!-- Modal content area -->
        <span class="close-button" role="button" tabindex="0" aria-label="Close quiz" onclick="closeModal()">&times;</span> <!-- Close button for modal (× symbol) -->
        <h2 id="quizTitle"></h2> <!-- Placeholder for dynamic quiz title -->

        <!-- Container for dynamically added quiz level or category options -->
        <div class="category-section" id="category"></div>

        <!-- Container for quiz difficulty levels or filters -->
        <div class="level-section" id="levels"></div>

        <!-- Container for displaying questions and answers -->
        <div class="question-section" id="questions"></div>
      </div>
    </div>

    <!-- Bundled quiz question data (generated from questions/*.json via scripts/bundle-questions.js).
         Loaded as a script, not fetched, so the page works even when opened directly via file://. -->
    <script src="questions-data.js"></script>
    <!-- JavaScript file for interactivity -->
    <script src="script.js"></script>
  </body>
</html>
